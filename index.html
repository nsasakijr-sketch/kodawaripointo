<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画再生ページ</title>
    <style>
        /* 見栄えを良くするための簡単なCSS（お好みで削除・変更してください） */
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin-top: 50px;
        }
        video {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>お知らせ動画</h1>

    <video width="800" controls>
        <source src="nideo.mp4" type="video/mp4">
        申し訳ありませんが、お使いのブラウザは埋め込み動画をサポートしていません。
    </video>

</body>
</html>
